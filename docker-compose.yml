version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: billing_db
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing_secret
      POSTGRES_DB: billing_preview
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing_preview"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billing_backend
    environment:
      DATABASE_URL: postgresql://billing:billing_secret@postgres:5432/billing_preview
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: billing_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data: